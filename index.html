<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>惜缘破军</title>
    <style>
        .copyright {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;

            font-size: 12px;
            color: gray;
        }

        * {

            padding: 0;

        }

        .wrap {
            position: relative;

        }

        a {
            text-decoration: none;
        }

        a:link {
            text-decoration: none;
        }

        a:visited {
            text-decoration: none;
        }

        a:hover {
            text-decoration: none;
        }

        a:active {
            text-decoration: none;
        }

        a:focus {
            text-decoration: none;
        }
    </style>

<body>
<div class="main">
    <div class="wrap">
        <p class="tips">网站建设中</p>
    </div>
</div>
