<!DOCTYPE html>
<html lang="en">
<head>
    <title>惜缘破军</title>
    <script src="https://libs.baidu.com/jquery/2.0.0/jquery.min.js"></script>
    <script src="https://cdn.bootcss.com/pagedown/1.0/Markdown.Converter.js"></script>
    <style>
        span {
            cursor: pointer;
            color: #fa7516;
        }
    </style>
</head>
<body>
<div id="root">
    <h1>随笔</h1>


    <h1>傲娇</h1>
    <p><span tag="md/《春风十里不如你》影评.md">《春风十里不如你》影评</span></p>


    <h1>学习</h1>
    <p><span tag="md/docker-swarm集群.md">docker-swarm集群</span></p>


    <h1>项目</h1></div>
</body>

<script>
    const converter = new Markdown.Converter();

    function show(url) {
        $.ajax({
            url: url,
            type: 'get',
            success: function (data) {
                const html = converter.makeHtml(data);
                $('#root').html(html);
            }
        });
    }

    $(document).ready(function () {
        $("span").each(function () {
            let tag = $(this).attr("tag");
            $(this).click(function () {
                let a = document.createElement('a');
                a.href = "/show.html?path=" + encodeURI(tag);
                a.target = "_blank";
                a.click();
                a.remove();
            })
        })
    });
</script>

</html>
